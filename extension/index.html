<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabSweep</title>

  <link rel="stylesheet" href="style.css">

  <!-- Surface flag: popup / side panel load index.html with ?surface=...
       External file (not inline) because MV3's CSP blocks inline scripts. -->
  <script src="surface.js"></script>
</head>
<body>
<div class="container">

  <header class="topbar">
    <div class="brand">TABSWEEP</div>
    <div class="topbar-right">
      <span id="dateDisplay"></span>
      <span id="totalCount"></span>
      <button class="settings-gear" id="langToggle" data-action="toggle-lang" title="Switch language / 切换语言">中</button>
      <button class="settings-gear" data-action="toggle-settings" title="Settings / 设置" aria-label="Settings / 设置">⚙</button>
    </div>
  </header>

  <!-- ================================================================
       SETTINGS PANEL — AI grouping + auto-close configuration
       Hidden by default; toggled by the gear button
       ================================================================ -->
  <div class="settings-panel" id="settingsPanel" style="display:none">
    <div class="settings-title" data-i18n="aiGrouping">AI grouping</div>
    <label class="settings-field"><span data-i18n="endpoint">Endpoint</span>
      <input type="text" id="setAiEndpoint" placeholder="…/v1/chat/completions or https://api.anthropic.com" autocomplete="off">
    </label>
    <label class="settings-field"><span data-i18n="apiKeyLabel">API key</span>
      <input type="password" id="setAiKey" placeholder="sk-..." autocomplete="off">
    </label>
    <label class="settings-field"><span data-i18n="modelLabel">Model</span>
      <input type="text" id="setAiModel" placeholder="gpt-4o-mini / claude-haiku-4-5" autocomplete="off" list="modelList">
      <datalist id="modelList"></datalist>
    </label>
    <button class="action-btn" data-action="test-connection" data-i18n="testConnection">Test connection &amp; list models</button>

    <label class="settings-field settings-inline">
      <input type="checkbox" id="setAiAuto"> <span data-i18n="autoBackground">Auto group in background (every 30 min)</span>
    </label>
    <button class="action-btn" data-action="regroup-all" data-i18n="regroupAll">Re-group all tabs now</button>

    <div class="settings-title" data-i18n="autoCloseTitle">Auto-close</div>
    <label class="settings-field settings-inline">
      <input type="checkbox" id="setAutoCloseEnabled"> <span data-i18n="scheduledSweep">Scheduled background sweep</span>
    </label>
    <div class="settings-grid">
      <label class="settings-field"><span data-i18n="scanInterval">Scan interval (min)</span>
        <input type="number" id="setIntervalMin" min="1" step="1">
      </label>
      <label class="settings-field"><span data-i18n="closeTabsIdle">Close tabs idle (days)</span>
        <input type="number" id="setTabStaleDays" min="0" step="0.5">
      </label>
      <label class="settings-field"><span data-i18n="closeGroupsIdle">Close groups idle (days)</span>
        <input type="number" id="setGroupStaleDays" min="0" step="0.5">
      </label>
      <label class="settings-field"><span data-i18n="dailyAt">Daily at (overrides interval)</span>
        <input type="time" id="setSweepTime">
      </label>
    </div>

    <button class="action-btn" data-action="save-settings" data-i18n="saveSettings">Save settings</button>
  </div>

  <div class="commandbar" id="commandBar"></div>

  <main>
    <div class="active-section" id="openTabsSection">
      <div id="openTabsGroups"></div>
    </div>

    <div class="section" id="workspacesSection" style="display:none">
      <div class="band">
        <span class="band-title" data-i18n="workspacesTitle">Workspaces</span>
        <span class="band-right"><span class="band-count" id="workspacesCount"></span></span>
      </div>
      <div id="workspacesList"></div>
    </div>

    <div class="section" id="deferredColumn" style="display:none">
      <div class="band">
        <span class="band-title" data-i18n="savedForLater">Saved for later</span>
        <span class="band-right"><span class="band-count" id="deferredCount"></span></span>
      </div>
      <div class="deferred-list" id="deferredList"></div>
      <div class="deferred-empty" id="deferredEmpty" style="display:none" data-i18n="nothingSaved">
        NOTHING SAVED.
      </div>
      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          <span data-i18n="archiveTitle">Archive</span>
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs..." data-i18n-placeholder="searchArchived">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span><span id="statTabs">—</span> <span data-i18n="openTabsSuffix">OPEN TABS</span></span>
    <span><a href="https://github.com/LuSlate/tabsweep" target="_top">TABSWEEP</a></span>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js"></script>

<!-- Shared grouping rules — must load after config.local.js (personal overrides)
     and before app.js (which calls these functions) -->
<script src="grouping.js"></script>

<!-- Shared stale/archive logic — dashboard + background agree on "stale" -->
<script src="sweep.js"></script>

<!-- Cloud AI semantic grouping — only runs on explicit Smart group click -->
<script src="ai-grouping.js"></script>

<!-- Dashboard language (zh/en) — dictionary + t() + init/toggle -->
<script src="i18n.js"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
